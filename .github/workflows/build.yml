name: 🚀 雲端編譯 ImmortalWrt 24.10 (Direct Config)

on:
  push:
    paths:
      - '.config'
      - 'seed.config'
      - '.github/workflows/build.yml'
      - 'diy.sh'
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  DIY_SH: diy.sh

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 釋放硬碟空間 (Maximize build space)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 檢出目前倉庫 (Checkout current repo)
        uses: actions/checkout@v4

      - name: 準備編譯環境 (Initialize environment)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo timedatectl set-timezone "Asia/Taipei"

      - name: 克隆 ImmortalWrt 原始碼 (Clone source code)
        run: git clone -b $REPO_BRANCH --single-branch $REPO_URL openwrt

      - name: 更新並安裝 Feeds (Update & Install feeds)
        working-directory: openwrt
        run: |
          [ -f ../feeds.conf.default ] && cp ../feeds.conf.default feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 載入自定義配置 (Load Config)
        run: |
          if [ -f "seed.config" ]; then
            cp "seed.config" openwrt/.config
            echo "✅ 已從 seed.config 載入配置"
          elif [ -f ".config" ]; then
            cp ".config" openwrt/.config
            echo "✅ 已從 .config 載入配置"
          else
            echo "❌ 錯誤：在倉庫根目錄找不到任何配置檔案 (.config 或 seed.config)"
            echo "目前目錄結構如下："
            ls -A
            exit 1
          fi
          
          cd openwrt
          sed -i 's/\r$//' .config
          [ -f ../$DIY_SH ] && cp ../$DIY_SH $DIY_SH && chmod +x $DIY_SH && ./$DIY_SH || true
          make defconfig

      - name: 預先下載所有套件與源碼 (Pre-download)
        working-directory: openwrt
        run: |
          make download -j8 V=s
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
          make download -j8 V=s

      - name: 開始編譯 (Compile Firmware)
        working-directory: openwrt
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: 整理產出物 (Organize files)
        working-directory: openwrt
        run: |
          mkdir -p bin/targets/final
          cp .config bin/targets/final/config.buildinfo
          rm -rf bin/targets/*/*/packages

      - name: 上傳韌體 (Upload)
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_24.10_N100_${{ github.run_id }}
          path: openwrt/bin/targets/
